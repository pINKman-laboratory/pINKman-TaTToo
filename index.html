<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P.INK.man Tattoo Lab | Ostrava Zábřeh</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- NOVÉ FONTY -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --h-blue: #00d2ff;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* LOGO */
        .logo-wrapper {
            padding: 40px 0 20px;
        }

        .logo-img {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            display: block;
            filter: drop-shadow(0 0 25px rgba(0, 210, 255, 0.6));
        }

        /* NADPISY */
        .section-header {
            font-family: 'Orbitron', sans-serif;
            color: var(--h-blue);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* MOTTO */
        .motto-box {
            border-left: 4px solid var(--h-blue);
            padding: 20px;
            margin: 30px auto;
            max-width: 800px;
            background: rgba(0, 210, 255, 0.05);
        }

        .motto-text {
            font-size: 1.2rem;
            font-weight: 600;
            font-style: italic;
        }

        .motto-subtext {
            display: block;
            margin-top: 10px;
            color: var(--h-blue);
            font-weight: 800;
            text-transform: uppercase;
        }

        /* KARTY */
        .blue-glow-card {
            background: #0f0f0f;
            border: 1px solid rgba(0, 210, 255, 0.2);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.6);
        }

        /* BUTTONY */
        .action-link {
            display: block;
            text-align: center;
            padding: 18px;
            margin-bottom: 12px;
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none;
            transition: 0.2s;
            border-radius: 6px;
        }

        .btn-primary {
            background: var(--h-blue);
            color: #000;
        }

        .btn-primary:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
        }

        .btn-secondary {
            border: 2px solid #333;
            color: #eee;
        }

        .btn-secondary:hover {
            border-color: #fff;
            background: #fff;
            color: #000;
        }
    </style>
</head>

<body class="p-4 md:p-8">

<div class="max-w-5xl mx-auto">

    <!-- LOGO NAHOŘE -->
    <header class="text-center">
        <div class="logo-wrapper">
            <img src="1000015536.png" alt="P.INK.man Logo" class="logo-img">
        </div>

        <!-- MOTTO -->
        <div class="motto-box text-left">
            <p class="motto-text">
                "Nejsme žádný salón, neděláme líbivý hovna."
            </p>
            <span class="motto-subtext">
                Underground. Autenticita. Styl.
            </span>
        </div>
    </header>

    <main class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-10">

        <!-- INFO -->
        <div class="space-y-8">
            <section class="blue-glow-card p-6">
                <h2 class="section-header">Lokalita</h2>
                <p class="text-3xl font-black">OSTRAVA ZÁBŘEH</p>
                <p class="text-xs text-gray-500 uppercase">Pouze po domluvě</p>
            </section>

            <section class="blue-glow-card p-6">
                <h2 class="section-header">Ceník</h2>
                <div class="space-y-3">
                    <div class="flex justify-between">
                        <span>Malé</span>
                        <span class="text-[#00d2ff] font-bold">od 1.000 Kč</span>
                    </div>
                    <div class="flex justify-between">
                        <span>Střední</span>
                        <span class="text-[#00d2ff] font-bold">od 3.000 Kč</span>
                    </div>
                    <div class="flex justify-between">
                        <span>Velké</span>
                        <span class="text-[#00d2ff] font-bold">6.000+ Kč</span>
                    </div>
                </div>
            </section>
        </div>

        <!-- KONTAKT -->
        <div class="space-y-8">
            <section class="blue-glow-card p-6">
                <h2 class="section-header">Rezervace</h2>

                <a href="https://www.instagram.com/p.INK.man" target="_blank" class="action-link btn-primary">
                    Instagram
                </a>

                <a href="mailto:p.INKman@seznam.cz" class="action-link btn-secondary">
                    Email
                </a>
            </section>

            <section class="p-6">
                <h2 class="section-header">Styl</h2>
                <div class="flex flex-wrap gap-2 text-xs">
                    <span class="border px-3 py-1">Blackwork</span>
                    <span class="border px-3 py-1">Fine-line</span>
                    <span class="border px-3 py-1">Linework</span>
                    <span class="border px-3 py-1">Dotwork</span>
                </div>
            </section>
        </div>

    </main>

</div>

</body>
</html>
